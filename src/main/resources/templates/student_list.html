<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Liste des Étudiants</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="table-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Liste des Étudiants</h2>
    <a href="/student/new" class="btn btn-primary">+ Nouvel Étudiant</a>
  </div>
  <a href="/" class="btn btn-outline-secondary mb-3">&larr; Retour</a>

  <table class="table table-hover">
    <thead>
    <tr>
      <th>Prénom</th><th>Nom</th><th>Email</th><th>Niveau</th><th>Filière</th><th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s : ${students}">
      <td th:text="${s.firstName}"></td><td th:text="${s.lastName}"></td>
      <td th:text="${s.email}"></td><td th:text="${s.academicLevel}"></td><td th:text="${s.stream}"></td>
      <td>
        <a th:href="@{/student/edit/{id}(id=${s.id})}" class="btn btn-warning btn-sm me-2">Modifier</a>
        <a th:href="@{/student/delete/{id}(id=${s.id})}" class="btn btn-danger btn-sm">Supprimer</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
