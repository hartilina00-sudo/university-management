<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Gestion Étudiant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

<div class="card shadow p-4" style="width: 100%; max-width: 600px;">
  <h2 class="text-center text-primary mb-4">Saisie Étudiant</h2>

  <form th:action="@{/student/save}" th:object="${student}" method="post">

    <input type="hidden" th:field="*{id}" />

    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Prénom :</label>
        <input type="text" th:field="*{firstName}" class="form-control" required />
      </div>

      <div class="col-md-6">
        <label class="form-label">Nom :</label>
        <input type="text" th:field="*{lastName}" class="form-control" required />
      </div>

      <div class="col-12">
        <label class="form-label">Email :</label>
        <input type="email" th:field="*{email}" class="form-control" required placeholder="ex: mehdi.idrissi@student.ma"/>
      </div>

      <div class="col-md-6">
        <label class="form-label">Niveau :</label>
        <select th:field="*{academicLevel}" class="form-select">
          <option value="L1">L1</option>
          <option value="L2">L2</option>
          <option value="L3">L3</option>
          <option value="M1">M1</option>
          <option value="M2">M2</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Groupe :</label>
        <select th:field="*{groupName}" class="form-select">
          <option value="G1">G1</option>
          <option value="G2">G2</option>
          <option value="G3">G3</option>
        </select>
      </div>

      <div class="col-12">
        <label class="form-label">Filière :</label>
        <input type="text" th:field="*{stream}" class="form-control" placeholder="ex: Génie Informatique" />
      </div>

      <div class="col-12">
        <label class="form-label">Compétences :</label>
        <textarea th:field="*{skills}" class="form-control" rows="2" placeholder="Java, SQL, React..."></textarea>
      </div>
    </div>

    <div class="d-flex justify-content-between mt-4">
      <button type="submit" class="btn btn-primary w-50 me-2">Enregistrer</button>
      <a href="/students" class="btn btn-secondary w-50">Annuler</a>
    </div>
  </form>
</div>

</body>
</html>
