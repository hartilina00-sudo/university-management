<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nouvel Enseignant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="mb-4 text-primary">Enregistrer un Enseignant</h2>

            <form th:action="@{/teacher/save}" th:object="${teacher}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Prénom:</label>
                        <input type="text" th:field="*{firstName}" class="form-control" required/>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Nom:</label>
                        <input type="text" th:field="*{lastName}" class="form-control" required/>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Email:</label>
                    <input type="email" th:field="*{email}" class="form-control" required/>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Grade:</label>
                        <input type="text" th:field="*{grade}" class="form-control"/>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Spécialité:</label>
                        <input type="text" th:field="*{specialty}" class="form-control"/>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Charge Horaire:</label>
                        <input type="number" th:field="*{hourlyLoad}" class="form-control"/>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Compétences:</label>
                    <input type="text" th:field="*{skills}" class="form-control" placeholder="Ex: IA, Big Data..."/>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a href="/teachers" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
