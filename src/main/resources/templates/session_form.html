<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gérer une Séance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="mb-4 text-primary">Planifier une Séance</h2>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/session/save}" th:object="${session}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label>Module & Enseignant:</label>
                    <select th:field="*{module}" class="form-select" required>
                        <option value="">-- Choisir un Module --</option>
                        <option th:each="m : ${modules}"
                                th:value="${m.id}"
                                th:text="${m.name} + ' (' + m.responsibleTeacher.lastName + ')'"></option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Jour:</label>
                        <select th:field="*{dayOfWeek}" class="form-select">
                            <option value="Lundi">Lundi</option>
                            <option value="Mardi">Mardi</option>
                            <option value="Mercredi">Mercredi</option>
                            <option value="Jeudi">Jeudi</option>
                            <option value="Vendredi">Vendredi</option>
                            <option value="Samedi">Samedi</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Salle:</label>
                        <input type="text" th:field="*{room}" class="form-control" placeholder="Ex: Salle 101" required/>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Heure Début:</label>
                        <input type="time" th:field="*{startTime}" class="form-control" required/>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Heure Fin:</label>
                        <input type="time" th:field="*{endTime}" class="form-control" required/>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Groupe Cible:</label>
                        <input type="text" th:field="*{groupName}" class="form-control" placeholder="Ex: G1, G2" required/>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a href="/sessions" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
