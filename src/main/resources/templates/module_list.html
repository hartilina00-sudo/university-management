<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Modules</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="table-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Liste des Modules</h2>
        <a href="/module/new" class="btn btn-primary">+ Nouveau Module</a>
    </div>
    <a href="/" class="btn btn-outline-secondary mb-3">&larr; Retour</a>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>Nom</th><th>Filière</th><th>Semestre</th><th>Vol. Horaire</th><th>Responsable</th><th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${modules}">
            <td th:text="${m.name}"></td><td th:text="${m.stream}"></td>
            <td th:text="${m.semester}"></td><td th:text="${m.hourlyVolume} + ' h'"></td>
            <td th:text="${m.responsibleTeacher != null ? m.responsibleTeacher.lastName : 'Aucun'}"></td>
            <td>
                <a th:href="@{/module/edit/{id}(id=${m.id})}" class="btn btn-warning btn-sm me-2">Modifier</a>
                <a th:href="@{/module/delete/{id}(id=${m.id})}" class="btn btn-danger btn-sm">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
