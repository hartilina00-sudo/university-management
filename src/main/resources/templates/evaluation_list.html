<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Liste des Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="table-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Liste des Notes</h2>

        <div sec:authorize="hasRole('ADMIN')">
            <a href="/evaluation/new" class="btn btn-primary">+ Ajouter une Note</a>
        </div>
    </div>
    <a href="/" class="btn btn-outline-secondary mb-3">&larr; Retour</a>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>Étudiant</th>
            <th>Module</th>
            <th>Note TP</th>
            <th>Note DS</th>
            <th>Projet</th>
            <th>Moyenne</th>
            <th>Feedback</th>
            <th sec:authorize="hasRole('ADMIN')">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e : ${evaluations}">
            <td th:text="${e.student.firstName} + ' ' + ${e.student.lastName}"></td>
            <td th:text="${e.module.name}"></td>
            <td th:text="${e.noteTP}"></td>
            <td th:text="${e.noteDS}"></td>
            <td th:text="${e.noteProjet}"></td>
            <td th:text="${e.noteFinale}" class="fw-bold text-primary"></td>
            <td th:text="${e.feedback}" class="small text-muted fst-italic"></td>

            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/evaluation/edit/{id}(id=${e.id})}" class="btn btn-warning btn-sm me-2">Modifier</a>
                <a th:href="@{/evaluation/delete/{id}(id=${e.id})}" class="btn btn-danger btn-sm">X</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
