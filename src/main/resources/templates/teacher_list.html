<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Liste des Enseignants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="table-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Liste des Enseignants</h2>
        <a href="/teacher/new" class="btn btn-primary">+ Nouvel Enseignant</a>
    </div>
    <a href="/" class="btn btn-outline-secondary mb-3">&larr; Retour</a>

    <table class="table table-hover">
        <thead>
        <tr>
            <th>Prénom</th><th>Nom</th><th>Email</th><th>Grade</th><th>Spécialité</th><th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${teachers}">
            <td th:text="${t.firstName}"></td><td th:text="${t.lastName}"></td>
            <td th:text="${t.email}"></td><td th:text="${t.grade}"></td><td th:text="${t.specialty}"></td>
            <td>
                <a th:href="@{/teacher/edit/{id}(id=${t.id})}" class="btn btn-warning btn-sm me-2">Modifier</a>
                <a th:href="@{/teacher/delete/{id}(id=${t.id})}" class="btn btn-danger btn-sm">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
