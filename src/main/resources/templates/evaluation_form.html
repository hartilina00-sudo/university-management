<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Saisie des Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

<div class="card shadow p-4" style="width: 100%; max-width: 800px;">
    <h2 class="text-center text-primary mb-4">Saisie des Notes</h2>

    <form th:action="@{/evaluation/save}" th:object="${evaluation}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Étudiant :</label>
                <select th:field="*{student}" class="form-select">
                    <option th:each="s : ${students}"
                            th:value="${s.id}"
                            th:text="${s.firstName + ' ' + s.lastName}">
                    </option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Module :</label>
                <select th:field="*{module}" class="form-select">
                    <option th:each="m : ${modules}"
                            th:value="${m.id}"
                            th:text="${m.name}">
                    </option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Note TP (/20):</label>
                <input type="number" step="0.5" th:field="*{noteTP}" class="form-control" placeholder="0.0" />
            </div>
            <div class="col-md-3">
                <label class="form-label">Note DS (/20):</label>
                <input type="number" step="0.5" th:field="*{noteDS}" class="form-control" placeholder="0.0" />
            </div>
            <div class="col-md-3">
                <label class="form-label">Projet (/20):</label>
                <input type="number" step="0.5" th:field="*{noteProjet}" class="form-control" placeholder="0.0" />
            </div>
            <div class="col-md-3">
                <label class="form-label">Participation (/20):</label>
                <input type="number" step="0.5" th:field="*{noteParticipation}" class="form-control" placeholder="0.0" />
            </div>

            <div class="col-12">
                <label class="form-label">Feedback / Appréciation:</label>
                <textarea th:field="*{feedback}" class="form-control" rows="2" placeholder="Commentaire pour l'étudiant..."></textarea>
            </div>
        </div>

        <div class="d-flex justify-content-between mt-4">
            <button type="submit" class="btn btn-primary w-50 me-2">Enregistrer les Notes</button>
            <a href="/evaluations" class="btn btn-secondary w-50">Annuler</a>
        </div>
    </form>
</div>

</body>
</html>
