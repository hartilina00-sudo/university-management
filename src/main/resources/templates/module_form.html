<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gérer un Module</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="mb-4 text-primary">Enregistrer un Module</h2>

            <form th:action="@{/module/save}" th:object="${module}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label>Nom du Module:</label>
                    <input type="text" th:field="*{name}" class="form-control" required/>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Filière:</label>
                        <input type="text" th:field="*{stream}" class="form-control" placeholder="Ex: Informatique"/>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Semestre:</label>
                        <input type="text" th:field="*{semester}" class="form-control" placeholder="Ex: S1"/>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Volume Horaire (Heures):</label>
                    <input type="number" th:field="*{hourlyVolume}" class="form-control" placeholder="40"/>
                </div>

                <div class="mb-3">
                    <label>Compétences Requises:</label>
                    <textarea th:field="*{requiredSkills}" class="form-control" rows="2"></textarea>
                </div>

                <div class="mb-3">
                    <label>Enseignant Responsable:</label>
                    <select th:field="*{responsibleTeacher}" class="form-select">
                        <option value="">-- Sélectionner un Responsable --</option>
                        <option th:each="t : ${teachers}"
                                th:value="${t.id}"
                                th:text="${t.firstName} + ' ' + ${t.lastName}"></option>
                    </select>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a href="/modules" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
