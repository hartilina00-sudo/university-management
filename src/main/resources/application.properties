# Connect to XAMPP MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/university_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Show SQL queries in the console (helpful for learning)
spring.jpa.show-sql=true

# Update the database schema automatically when we change code
spring.jpa.hibernate.ddl-auto=update

# Thymeleaf settings (so you can edit HTML without restarting)
spring.cache.type=none
spring.thymeleaf.cache=false
